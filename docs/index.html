<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gemini Chatbot</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f5ef;
        color: #1f2933;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(760px, 100%);
        min-height: min(760px, calc(100vh - 48px));
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 44px);
        font-weight: 750;
      }

      .subtitle {
        margin: 6px 0 0;
        color: #576574;
      }

      #chat {
        min-height: 360px;
        overflow-y: auto;
        border: 1px solid #d7d0c2;
        background: #fffdf8;
        border-radius: 8px;
        padding: 16px;
      }

      .message {
        max-width: 86%;
        padding: 10px 12px;
        border-radius: 8px;
        line-height: 1.45;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .message + .message {
        margin-top: 10px;
      }

      .user {
        margin-left: auto;
        background: #174ea6;
        color: white;
      }

      .assistant {
        background: #e9eef6;
        color: #1f2933;
      }

      .system {
        max-width: 100%;
        background: #fff3cd;
        color: #5f4700;
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      input,
      button {
        min-height: 44px;
        border-radius: 8px;
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid #c8c1b4;
        padding: 0 12px;
        background: #fffdf8;
        color: inherit;
      }

      button {
        border: 0;
        padding: 0 18px;
        background: #0f766e;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Gemini Chatbot</h1>
        <p class="subtitle">Static GitHub Pages frontend, Python Gemini backend.</p>
      </header>

      <section id="chat" aria-live="polite"></section>

      <form id="form">
        <input id="message" autocomplete="off" placeholder="Ask something..." />
        <button id="send" type="submit">Send</button>
      </form>
    </main>

    <script>
      const API_URL = "https://chatbot-custeng-tawny.vercel.app/chat";

      const chat = document.getElementById("chat");
      const form = document.getElementById("form");
      const input = document.getElementById("message");
      const send = document.getElementById("send");
      const messages = [];

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[char]);
      }

      function addMessage(role, content) {
        messages.push({ role, content });
        render();
      }

      function render() {
        chat.innerHTML = messages
          .map((message) => `<div class="message ${message.role}">${escapeHtml(message.content)}</div>`)
          .join("");
        chat.scrollTop = chat.scrollHeight;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const content = input.value.trim();
        if (!content || send.disabled) return;

        addMessage("user", content);
        input.value = "";
        send.disabled = true;

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              messages: messages.filter((message) => message.role !== "system"),
            }),
          });

          const data = await response.json();

          if (!response.ok) {
            addMessage("system", data.error || "Request failed.");
          } else {
            addMessage("assistant", data.reply || "No response text returned.");
          }
        } catch (error) {
          addMessage("system", "Could not reach the backend. Is it running?");
        } finally {
          send.disabled = false;
          input.focus();
        }
      });
    </script>
  </body>
</html>
